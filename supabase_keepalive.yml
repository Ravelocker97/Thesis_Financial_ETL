# .github/workflows/supabase_keepalive.yml
#
# Keeps your Supabase free-tier project alive by pinging it twice a week.
#
# SETUP (one-time):
#   1. In your GitHub repo go to Settings → Secrets and variables → Actions
#   2. Add two repository secrets:
#        SUPABASE_URL   → https://xyzxyzxyz.supabase.co
#        SUPABASE_KEY   → your project's anon/public key
#   3. Replace YOUR_TABLE_NAME below with any real table in your project.
#   4. Push this file to your repo under .github/workflows/

name: Supabase Keep-Alive

on:
  schedule:
    # Runs at 08:00 UTC every Monday and Thursday (twice a week = well within 7-day limit)
    - cron: "0 8 * * 1,4"
  workflow_dispatch: # Also allows manual triggering from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase (read-only query)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          node - <<'EOF'
          const TABLE = "YOUR_TABLE_NAME";   // <-- change this

          async function ping() {
            const url  = `${process.env.SUPABASE_URL}/rest/v1/${TABLE}?select=*&limit=1`;
            const res  = await fetch(url, {
              headers: {
                apikey:        process.env.SUPABASE_KEY,
                Authorization: `Bearer ${process.env.SUPABASE_KEY}`,
              },
            });

            if (!res.ok) {
              console.error(`❌  Ping failed – HTTP ${res.status}: ${await res.text()}`);
              process.exit(1);
            }

            const data = await res.json();
            const ts   = new Date().toISOString();
            console.log(`[${ts}] ✅  Supabase ping successful (rows returned: ${data.length})`);
          }

          ping();
          EOF
